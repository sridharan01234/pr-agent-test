name: PR Review Agent

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout pr-agent tool
        uses: actions/checkout@v5
        with:
          repository: sridharan01234/pr-agent
          token: ${{ secrets.PAT_TOKEN }}
          path: pr-agent

      - name: Checkout this repo (the code being reviewed)
        uses: actions/checkout@v5
        with:
          path: target-repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr-agent/package-lock.json

      - name: Install dependencies
        working-directory: pr-agent
        run: npm ci

      - name: Build review agent
        working-directory: pr-agent
        run: npm run build

      - name: Run AI Code Review
        working-directory: pr-agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node dist/scripts/review-pr-action.js
