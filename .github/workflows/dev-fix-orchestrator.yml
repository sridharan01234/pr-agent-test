name: Dev Fix Orchestrator

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to fix automatically'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  orchestrate:
    name: Auto-Fix Issue
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'auto-fix'))

    steps:
      - name: Checkout pr-agent (orchestrator source)
        uses: actions/checkout@v5
        with:
          repository: sridharan01234/pr-agent
          token: ${{ secrets.PAT_TOKEN }}
          path: pr-agent

      - name: Checkout this repo (the one being fixed)
        uses: actions/checkout@v5
        with:
          path: target-repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr-agent/package-lock.json

      - name: Install dependencies for orchestrator
        working-directory: pr-agent
        run: npm ci

      - name: Build orchestrator
        working-directory: pr-agent
        run: npm run build

      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Dev Fix Orchestrator
        working-directory: pr-agent
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: node dist/scripts/dev-fix-orchestrator.js
